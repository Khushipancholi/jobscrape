<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberJob Scout — Offline AI Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#050a0f; --surface:#0d1821; --surface2:#111e2d; --border:#1a3a5c;
    --accent:#00e5ff; --accent2:#7c3aed; --green:#00ff9d;
    --text:#e0f0ff; --muted:#4a7a9b; --card:#0a1929;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}

  header{position:relative;z-index:10;padding:14px 24px;border-bottom:1px solid var(--border);background:rgba(5,10,15,0.97);display:flex;align-items:center;gap:12px;}
  .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 0 20px rgba(0,229,255,0.3);}
  .logo-text h1{font-family:'Space Mono',monospace;font-size:1rem;font-weight:700;color:var(--accent);}
  .logo-text p{font-size:0.65rem;color:var(--muted);font-family:'Space Mono',monospace;}
  .offline-badge{margin-left:auto;background:rgba(0,255,157,0.12);border:1px solid rgba(0,255,157,0.35);color:var(--green);font-family:'Space Mono',monospace;font-size:0.62rem;padding:3px 10px;border-radius:20px;}

  .main-layout{flex:1;display:flex;overflow:hidden;position:relative;z-index:1;}

  /* sidebar */
  .sidebar{width:310px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:rgba(13,24,33,0.85);}
  .sidebar-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .sidebar-title{font-size:0.68rem;font-family:'Space Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
  .count-badge{background:rgba(0,255,157,0.15);color:var(--green);font-family:'Space Mono',monospace;font-size:0.62rem;padding:2px 8px;border-radius:10px;border:1px solid rgba(0,255,157,0.3);}
  .sidebar-search{padding:10px 12px;border-bottom:1px solid var(--border);}
  .sidebar-search input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 12px;color:var(--text);font-family:'Syne',sans-serif;font-size:0.78rem;outline:none;transition:border-color 0.2s;}
  .sidebar-search input:focus{border-color:var(--accent);}
  .sidebar-search input::placeholder{color:var(--muted);}
  .job-scroll{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
  .jcard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:all 0.18s;position:relative;overflow:hidden;}
  .jcard:hover,.jcard.hl{border-color:var(--accent);background:rgba(0,229,255,0.05);transform:translateX(2px);}
  .jcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:0;transition:opacity 0.18s;}
  .jcard:hover::before,.jcard.hl::before{opacity:1;}
  .jt{font-size:0.8rem;font-weight:600;margin-bottom:3px;line-height:1.3;}
  .jco{font-size:0.7rem;color:var(--accent);font-family:'Space Mono',monospace;margin-bottom:3px;}
  .jl{font-size:0.65rem;color:var(--muted);margin-bottom:7px;}
  .jsk{display:flex;flex-wrap:wrap;gap:3px;}
  .sk{font-size:0.58rem;font-family:'Space Mono',monospace;background:rgba(124,58,237,0.2);color:#c084fc;border:1px solid rgba(124,58,237,0.3);padding:2px 6px;border-radius:4px;}
  .src{position:absolute;top:9px;right:9px;font-size:0.52rem;font-family:'Space Mono',monospace;padding:2px 6px;border-radius:4px;}
  .li{background:rgba(10,102,194,0.3);color:#60a5fa;border:1px solid rgba(10,102,194,0.4);}
  .in{background:rgba(0,105,255,0.2);color:#93c5fd;border:1px solid rgba(0,105,255,0.3);}

  /* chat */
  .chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .chat-msgs{flex:1;overflow-y:auto;padding:18px 22px;display:flex;flex-direction:column;gap:14px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
  .msg{display:flex;gap:9px;max-width:90%;animation:fu 0.25s ease;}
  @keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .msg.user{align-self:flex-end;flex-direction:row-reverse;}
  .msg.bot{align-self:flex-start;}
  .av{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
  .bav{background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 0 10px rgba(0,229,255,0.25);}
  .uav{background:rgba(124,58,237,0.3);border:1px solid rgba(124,58,237,0.5);}
  .bbl{padding:11px 15px;border-radius:12px;font-size:0.83rem;line-height:1.65;}
  .bbl.bot{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px;}
  .bbl.user{background:rgba(124,58,237,0.22);border:1px solid rgba(124,58,237,0.4);border-bottom-right-radius:4px;}
  .bbl strong{color:var(--accent);}
  .bbl em{color:#c084fc;font-style:normal;}
  .rcard{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-top:8px;}
  .rct{font-size:0.82rem;font-weight:700;color:var(--accent);margin-bottom:2px;}
  .rcc{font-size:0.72rem;color:#c084fc;font-family:'Space Mono',monospace;margin-bottom:2px;}
  .rcl{font-size:0.68rem;color:var(--muted);margin-bottom:6px;}
  .rcsk{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px;}
  .rclink{display:inline-block;font-size:0.65rem;font-family:'Space Mono',monospace;color:var(--green);text-decoration:none;border:1px solid rgba(0,255,157,0.3);padding:3px 8px;border-radius:5px;background:rgba(0,255,157,0.07);}
  .rclink:hover{background:rgba(0,255,157,0.15);}
  .dots{display:flex;gap:5px;align-items:center;padding:12px 15px;}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:bl 1.1s infinite;}
  .dot:nth-child(2){animation-delay:0.18s}.dot:nth-child(3){animation-delay:0.36s}
  @keyframes bl{0%,80%,100%{opacity:0.2;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}
  .chips{padding:0 20px 10px;display:flex;flex-wrap:wrap;gap:6px;}
  .chip{background:rgba(0,229,255,0.06);border:1px solid rgba(0,229,255,0.2);color:var(--accent);font-family:'Space Mono',monospace;font-size:0.62rem;padding:5px 11px;border-radius:20px;cursor:pointer;transition:all 0.18s;}
  .chip:hover{background:rgba(0,229,255,0.15);border-color:var(--accent);}
  .input-wrap{padding:12px 20px 16px;border-top:1px solid var(--border);background:rgba(5,10,15,0.95);}
  .input-row{display:flex;gap:9px;align-items:flex-end;}
  .cin{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 15px;color:var(--text);font-family:'Syne',sans-serif;font-size:0.83rem;resize:none;outline:none;transition:border-color 0.2s;min-height:44px;max-height:110px;}
  .cin:focus{border-color:var(--accent);}
  .cin::placeholder{color:var(--muted);}
  .sbtn{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;box-shadow:0 0 14px rgba(0,229,255,0.25);transition:transform 0.15s,box-shadow 0.15s;}
  .sbtn:hover{transform:scale(1.06);box-shadow:0 0 22px rgba(0,229,255,0.45);}
  .sbtn:active{transform:scale(0.96);}
</style>
</head>
<body>

<header>
  <div class="logo-icon">🛡️</div>
  <div class="logo-text">
    <h1>CyberJob Scout</h1>
    <p>Cyber Security Internships • India</p>
  </div>
  <span class="offline-badge">✅ WORKS OFFLINE</span>
</header>

<div class="main-layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">📋 Scraped Listings</span>
      <span class="count-badge" id="cnt">10 jobs</span>
    </div>
    <div class="sidebar-search">
      <input type="text" placeholder="🔍  Filter jobs…" oninput="filterSidebar(this.value)">
    </div>
    <div class="job-scroll" id="jobList"></div>
  </div>

  <div class="chat-area">
    <div class="chat-msgs" id="chatMsgs"></div>
    <div class="chips">
      <span class="chip" onclick="ask('Show all jobs')">All jobs</span>
      <span class="chip" onclick="ask('Jobs in Bengaluru')">Bengaluru</span>
      <span class="chip" onclick="ask('Jobs in Mumbai')">Mumbai</span>
      <span class="chip" onclick="ask('SOC or SIEM roles')">SOC / SIEM</span>
      <span class="chip" onclick="ask('Python skills required')">Python</span>
      <span class="chip" onclick="ask('Penetration testing jobs')">Pen Testing</span>
      <span class="chip" onclick="ask('LinkedIn jobs only')">LinkedIn</span>
      <span class="chip" onclick="ask('What skills should I learn?')">Skills advice</span>
    </div>
    <div class="input-wrap">
      <div class="input-row">
        <textarea class="cin" id="cin" placeholder="Search jobs, skills, companies, cities…" rows="1"
          onkeydown="handleKey(event)" oninput="rsz(this)"></textarea>
        <button class="sbtn" onclick="send()">➤</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── DATA ─────────────────────────────────────────────────────
const JOBS = [
  {"source":"LinkedIn","data":{"job_title":"Cybersecurity Intern","company":"Infosys","location":"Bengaluru, India","job_url":"https://linkedin.com/jobs"},"ai_summary":{"top_skills":["SOC","SIEM","Python","Linux"]}},
  {"source":"LinkedIn","data":{"job_title":"Security Analyst Intern","company":"Wipro","location":"Hyderabad, India","job_url":"https://linkedin.com/jobs"},"ai_summary":{"top_skills":["penetration testing","Wireshark","network security"]}},
  {"source":"LinkedIn","data":{"job_title":"Cyber Security Intern","company":"TCS","location":"Mumbai, India","job_url":"https://linkedin.com/jobs"},"ai_summary":{"top_skills":["firewall","vulnerability assessment","incident response"]}},
  {"source":"Indeed","data":{"job_title":"Information Security Intern","company":"HCL Technologies","location":"Noida, India","job_url":"https://in.indeed.com/jobs"},"ai_summary":{"top_skills":["ethical hacking","Metasploit","Burp Suite"]}},
  {"source":"Indeed","data":{"job_title":"SOC Analyst Intern","company":"Tech Mahindra","location":"Pune, India","job_url":"https://in.indeed.com/jobs"},"ai_summary":{"top_skills":["SOC","SIEM","malware analysis","cloud security"]}},
  {"source":"LinkedIn","data":{"job_title":"Network Security Intern","company":"Cognizant","location":"Chennai, India","job_url":"https://linkedin.com/jobs"},"ai_summary":{"top_skills":["network security","firewall","Linux","Python"]}},
  {"source":"Indeed","data":{"job_title":"Penetration Testing Intern","company":"Accenture","location":"Bengaluru, India","job_url":"https://in.indeed.com/jobs"},"ai_summary":{"top_skills":["penetration testing","OSCP","Kali Linux","Burp Suite"]}},
  {"source":"LinkedIn","data":{"job_title":"Cyber Security Graduate Trainee","company":"IBM India","location":"Bengaluru, India","job_url":"https://linkedin.com/jobs"},"ai_summary":{"top_skills":["cloud security","Python","SIEM","CompTIA Security+"]}},
  {"source":"Indeed","data":{"job_title":"IT Security Intern","company":"Capgemini","location":"Mumbai, India","job_url":"https://in.indeed.com/jobs"},"ai_summary":{"top_skills":["vulnerability assessment","incident response","network security"]}},
  {"source":"LinkedIn","data":{"job_title":"Cyber Security Research Intern","company":"DRDO","location":"Delhi, India","job_url":"https://linkedin.com/jobs"},"ai_summary":{"top_skills":["cryptography","malware analysis","Python","ethical hacking"]}}
];

// ── OFFLINE AI ────────────────────────────────────────────────
function smartSearch(q) {
  q = q.toLowerCase();
  return JOBS.filter(j =>
    j.data.job_title.toLowerCase().includes(q) ||
    j.data.company.toLowerCase().includes(q) ||
    j.data.location.toLowerCase().includes(q) ||
    j.source.toLowerCase().includes(q) ||
    j.ai_summary.top_skills.join(' ').toLowerCase().includes(q)
  );
}

function buildReply(input) {
  const q = input.toLowerCase().trim();

  // greeting
  if (/^(hi|hello|hey|hii|yo|sup|howdy)\b/.test(q))
    return {text:`Hey! 👋 I'm <strong>CyberJob Scout</strong> — your offline cyber security job assistant.\n\nI have <strong>${JOBS.length} scraped internship listings</strong> from LinkedIn & Indeed across India.\n\nTry asking: <em>"Jobs in Bengaluru"</em>, <em>"SOC roles"</em>, or <em>"What skills should I learn?"</em>`, jobs:[]};

  // all jobs
  if (/all jobs|show all|list all|every job/.test(q))
    return {text:`Here are all <strong>${JOBS.length} scraped listings</strong>:`, jobs:JOBS};

  // count
  if (/how many|count|total/.test(q)) {
    const li=JOBS.filter(j=>j.source==='LinkedIn').length;
    return {text:`<strong>${JOBS.length} jobs</strong> total — <strong>${li}</strong> from LinkedIn, <strong>${JOBS.length-li}</strong> from Indeed.`, jobs:[]};
  }

  // companies
  if (/compan|who.*(hiring|recruit)|which.*compan/.test(q)) {
    const cos=[...new Set(JOBS.map(j=>j.data.company))];
    return {text:`<strong>${cos.length} companies</strong> currently hiring:\n\n${cos.map((c,i)=>`${i+1}. ${c}`).join('\n')}`, jobs:[]};
  }

  // skills advice
  if (/skill|learn|prepare|roadmap|study/.test(q)) {
    const freq={};
    JOBS.flatMap(j=>j.ai_summary.top_skills).forEach(s=>freq[s]=(freq[s]||0)+1);
    const top=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,8);
    return {text:`<strong>Most in-demand skills across all listings:</strong>\n\n${top.map(([s,n])=>`• <strong>${s}</strong> — ${n} job${n>1?'s':''}`).join('\n')}\n\nFocus on these to stand out! 🎯`, jobs:[]};
  }

  // source filter
  if (/\blinkedin\b/.test(q)) { const r=JOBS.filter(j=>j.source==='LinkedIn'); return {text:`<strong>${r.length} LinkedIn</strong> listings:`, jobs:r}; }
  if (/\bindeed\b/.test(q))   { const r=JOBS.filter(j=>j.source==='Indeed');   return {text:`<strong>${r.length} Indeed</strong> listings:`,   jobs:r}; }

  // city search
  const cityMap = {bengaluru:'bengaluru',bangalore:'bengaluru',mumbai:'mumbai',hyderabad:'hyderabad',pune:'pune',chennai:'chennai',noida:'noida',delhi:'delhi',kolkata:'kolkata'};
  for (const [alias,city] of Object.entries(cityMap)) {
    if (q.includes(alias)) {
      const r=JOBS.filter(j=>j.data.location.toLowerCase().includes(city)||(city==='bengaluru'&&j.data.location.toLowerCase().includes('bangalore')));
      const label=city.charAt(0).toUpperCase()+city.slice(1);
      return r.length
        ? {text:`<strong>${r.length} job${r.length>1?'s':''}</strong> in <strong>${label}</strong>:`, jobs:r}
        : {text:`No listings found in <strong>${label}</strong>. Try Bengaluru, Mumbai, or Noida.`, jobs:[]};
    }
  }

  // general keyword
  const r=smartSearch(q);
  if (r.length) return {text:`<strong>${r.length} match${r.length>1?'es':''}</strong> for "<em>${input}</em>":`, jobs:r};

  return {text:`Hmm, nothing found for "<em>${input}</em>".\n\nTry a <strong>skill</strong> (Python, SOC, Wireshark), a <strong>city</strong> (Bengaluru, Delhi, Mumbai), or a <strong>company</strong> (TCS, Infosys, DRDO).`, jobs:[]};
}

// ── RENDER ────────────────────────────────────────────────────
function renderSidebar(jobs) {
  document.getElementById('cnt').textContent = `${jobs.length} jobs`;
  document.getElementById('jobList').innerHTML = jobs.map((j,i)=>`
    <div class="jcard" id="jc${i}" onclick="hlCard(${i})">
      <span class="src ${j.source==='LinkedIn'?'li':'in'}">${j.source}</span>
      <div class="jt">${j.data.job_title}</div>
      <div class="jco">${j.data.company}</div>
      <div class="jl">📍 ${j.data.location}</div>
      <div class="jsk">${j.ai_summary.top_skills.map(s=>`<span class="sk">${s}</span>`).join('')}</div>
    </div>`).join('');
}

function hlCard(i) {
  document.querySelectorAll('.jcard').forEach(c=>c.classList.remove('hl'));
  document.getElementById(`jc${i}`)?.classList.add('hl');
}

function filterSidebar(v) {
  const q=v.toLowerCase();
  renderSidebar(q?JOBS.filter(j=>
    j.data.job_title.toLowerCase().includes(q)||
    j.data.company.toLowerCase().includes(q)||
    j.data.location.toLowerCase().includes(q)||
    j.ai_summary.top_skills.join(' ').toLowerCase().includes(q)
  ):JOBS);
}

function jobHTML(j) {
  return `<div class="rcard">
    <div class="rct">${j.data.job_title}</div>
    <div class="rcc">${j.data.company}</div>
    <div class="rcl">📍 ${j.data.location} &nbsp;|&nbsp; ${j.source}</div>
    <div class="rcsk">${j.ai_summary.top_skills.map(s=>`<span class="sk">${s}</span>`).join('')}</div>
    <a class="rclink" href="${j.data.job_url}" target="_blank">View Job →</a>
  </div>`;
}

// ── CHAT ──────────────────────────────────────────────────────
function addMsg(role, html) {
  const c=document.getElementById('chatMsgs');
  const d=document.createElement('div');
  d.className=`msg ${role}`;
  const av=role==='bot'?`<div class="av bav">🛡️</div>`:`<div class="av uav">👤</div>`;
  d.innerHTML=`${av}<div class="bbl ${role}">${html}</div>`;
  c.appendChild(d); c.scrollTop=c.scrollHeight;
}

function showTyping() {
  const c=document.getElementById('chatMsgs');
  const d=document.createElement('div');
  d.className='msg bot'; d.id='typ';
  d.innerHTML=`<div class="av bav">🛡️</div><div class="bbl bot"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  c.appendChild(d); c.scrollTop=c.scrollHeight;
}
function hideTyping(){document.getElementById('typ')?.remove();}
function nl(s){return s.replace(/\n/g,'<br>');}

function send() {
  const el=document.getElementById('cin');
  const txt=el.value.trim(); if(!txt) return;
  el.value=''; rsz(el);
  addMsg('user', txt);
  showTyping();
  setTimeout(()=>{
    hideTyping();
    const {text, jobs}=buildReply(txt);
    addMsg('bot', nl(text)+jobs.map(j=>jobHTML(j)).join(''));
    if(jobs.length){const idx=JOBS.indexOf(jobs[0]);if(idx!==-1)hlCard(idx);}
  }, 380);
}

function ask(t){document.getElementById('cin').value=t; send();}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
function rsz(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px';}

// ── INIT ──────────────────────────────────────────────────────
renderSidebar(JOBS);
addMsg('bot',`👋 Welcome to <strong>CyberJob Scout</strong>!<br><br>
✅ <strong>100% Offline</strong> — works from your pendrive, no internet or API key needed.<br><br>
I have <strong>${JOBS.length} Cyber Security internship listings</strong> scraped from LinkedIn &amp; Indeed across India.<br><br>
• 🔍 Search by <strong>skill</strong>, <strong>city</strong>, or <strong>company</strong><br>
• 📋 Browse all listings in the left sidebar<br>
• 💡 Ask <em>"What skills should I learn?"</em><br><br>
Try: <em>"Show jobs in Bengaluru"</em> or click a quick filter above ⬆️`);
</script>
</body>
</html>
